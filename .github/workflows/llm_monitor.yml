name: Daily LLM Deprecation Monitor

on:
  schedule:
    # Triggers daily at exactly 9:00 AM local time in New York
    # - cron: '0 9 * * *'
    - cron: '55 19 * * *' 
      timezone: 'Asia/Kolkata'
  workflow_dispatch: # Allows you to manually trigger the script anytime

jobs:
  run-monitoring-service:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants git-commit push permissions to write 'Yes' back to Excel

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ingestion Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-dateutil

      - name: Run Monitoring Script
        env:
          SMTP_SERVER: "smtp.gmail.com" # Change if using Outlook, Sendgrid, etc.
          SMTP_PORT: 465
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python llm_monitor.py

      - name: Commit and Save State
        run: |
          git config --global user.name "LLM Monitor Bot"
          git config --global user.email "actions@github.com"
          git add Scheduler_Testing.xlsx
          # Only commit and push if changes were written (AlertSent changed to 'Yes')
          git diff-index --quiet HEAD || (git commit -m "Auto-Update: Alert Sent execution flags [skip ci]" && git push)
